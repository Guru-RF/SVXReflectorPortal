<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>SVX Reflector &#8226; Live</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin="anonymous"
    />

    <!-- Icons + PWA -->
    <link
      rel="icon"
      href="/icons/favicon-32.png"
      sizes="32x32"
      type="image/png"
    />
    <link
      rel="icon"
      href="/icons/favicon-16.png"
      sizes="16x16"
      type="image/png"
    />
    <link
      rel="apple-touch-icon"
      href="/icons/apple-touch-icon.png"
      sizes="180x180"
    />
    <link
      rel="apple-touch-icon"
      href="/icons/apple-touch-icon-167x167.png"
      sizes="167x167"
    />
    <link
      rel="apple-touch-icon"
      href="/icons/apple-touch-icon-152x152.png"
      sizes="152x152"
    />
    <link
      rel="apple-touch-icon"
      href="/icons/apple-touch-icon-120x120.png"
      sizes="120x120"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="SVX Repeater" />
    <meta name="mobile-web-app-capable" content="yes" />

    <style>
      :root {
        --bg: #ffffff;
        --fg: #0f172a;
        --muted: #64748b;
        --chip: #eef2ff;
        --ok: #0a7;
        --ok-visited: #075;
        --bad: #b00;
        --border: #e5e7eb;
        --panel: #f8fafc;
        --accent: #a52a2a; /* talking */
        --hotspot: #ffa502; /* hotspots */
        --virtual: #3b82f6; /* AI-detected virtual callsigns */

        --overlap-ring: #e7e2c6; /* overlap marker outline */
        --spider-ring: rgba(30, 41, 59, 0.35); /* spiderfy rings/legs */

        --dark-brightness: 1.28;
        --dark-contrast: 0.96;
        --dark-saturation: 1.06;

        --tableH: 36vh;

        --headerH: 72px; /* JS overrides */
        --headerAnim: 260ms;
      }

      [data-theme="dark"] {
        --bg: #0b1220;
        --fg: #e6e8ee;
        --muted: #9aa3b2;
        --chip: #1b2538;
        --ok: #35c48d;
        --ok-visited: #238b66;
        --bad: #ff6b6b;
        --border: #1f2a3b;
        --panel: #0f172a;
        --accent: #a52a2a;
        --spider-ring: rgba(
          226,
          232,
          240,
          0.55
        ); /* spiderfy rings/legs (lighter) */
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overscroll-behavior: none;
      }

      body {
        margin: 0;
        font:
          15px/1.45 system-ui,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      @supports not (height: 100dvh) {
        body {
          height: 100vh;
        }
      }

      header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;

        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        transform: translateY(0);
        transition: transform var(--headerAnim) ease;
      }
      body.header-hidden header {
        transform: translateY(calc(-1 * var(--headerH)));
      }

      main {
        padding-top: var(--headerH);
        transition: padding-top var(--headerAnim) ease;

        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      body.header-hidden main {
        padding-top: 0;
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .toolbar {
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
      }
      .toolbar .spacer {
        flex: 1;
      }

      .conn {
        font-size: 13px;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--chip);
      }
      .ok {
        color: var(--ok);
      }
      .bad {
        color: var(--bad);
      }

      select {
        padding: 6px 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--fg);
        font: inherit;
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
      }

      label.check {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--panel);
        border: 1px solid var(--border);
        user-select: none;
      }
      label.check input {
        transform: scale(1.05);
      }

      /* Theme toggle */
      .switch {
        position: relative;
        display: inline-block;
        width: 52px;
        height: 28px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #cfd7e3;
        border-radius: 999px;
        transition: 0.2s;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 22px;
        width: 22px;
        left: 3px;
        top: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.2s;
      }
      input:checked + .slider {
        background: var(--accent);
      }
      input:checked + .slider:before {
        transform: translateX(24px);
      }
      .legend {
        font-size: 12px;
        color: var(--muted);
      }

      .tableFrame {
        height: var(--tableH);
        min-height: 220px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        overflow: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }
      .tableFrame::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      thead th {
        position: sticky;
        top: 0;
        background: var(--panel);
        z-index: 2;
      }
      th,
      td {
        padding: 10px 10px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      th {
        text-align: left;
        color: var(--muted);
        font-weight: 600;
      }

      th.narrow,
      td.narrow {
        width: 34px;
        padding: 10px 6px;
      }
      td.center,
      th.center {
        text-align: center;
      }

      th.tg,
      td.tg {
        width: 32px;
        padding: 6px 4px;
        text-align: center;
      }
      th.tg > span {
        display: inline-block;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        letter-spacing: 0.5px;
      }

      .dotOnline,
      .dotOffline,
      .dotVirtual {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        display: inline-block;
        border: 1px solid rgba(0, 0, 0, 0.15);
      }
      .dotOnline {
        background: var(--ok);
      }
      .dotOffline {
        background: var(--bad);
      }
      .dotVirtual {
        background: var(--virtual);
      }

      .leaflet-tooltip.talkLabel {
        background: var(--panel);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 2px 8px;
        font-weight: 800;
        font-size: 12px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      }
      .leaflet-tooltip.talkLabel:before {
        border-top-color: var(--panel);
      }

      /* Center / reset button (Leaflet control) */
      .leaflet-bar a.leaflet-control-center {
        background: var(--panel);
        color: var(--fg);
        border-bottom: none;
        width: 34px;
        height: 34px;
        line-height: 34px;
        text-align: center;
        font-weight: 900;
        font-size: 16px;
      }
      .leaflet-bar a.leaflet-control-center:hover {
        background: rgba(127, 127, 127, 0.14);
      }

      .tgCheck {
        display: inline-flex;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        align-items: center;
        justify-content: center;
        background: rgba(59, 130, 246, 0.16);
        border: 1px solid rgba(59, 130, 246, 0.35);
        color: rgba(147, 197, 253, 1);
        font-size: 12px;
        font-weight: 900;
        line-height: 1;
      }
      .tgTalkDot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        display: inline-block;
        background: var(--ok);
        border: 1px solid rgba(0, 0, 0, 0.15);
      }
      td.tg.tgOther {
        text-align: center;
        white-space: nowrap;
      }
      td.tg.tgOther .tgTalkDot {
        vertical-align: middle;
      }
      .tgOtherLabel {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(165, 42, 42, 0.12);
        border: 1px solid rgba(165, 42, 42, 0.45);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
        vertical-align: middle;
      }

      .timeNow {
        color: var(--ok);
        font-weight: 700;
      }
      tr.talkingRow td {
        background: rgba(53, 196, 141, 0.06);
      }

      #map {
        flex: 1;
        min-height: 320px;
        border-bottom: 1px solid var(--border);
      }

      .tiles-dark-soft img.leaflet-tile {
        filter: brightness(var(--dark-brightness))
          contrast(var(--dark-contrast)) saturate(var(--dark-saturation));
      }

      /* Footer (desktop visible; mobile hidden) */
      footer.site-footer {
        border-top: 1px solid var(--border);
        background: var(--panel);
        padding: 10px 16px;
        font-size: 13px;
        color: var(--muted);
      }
      footer.site-footer a {
        color: var(--ok);
        text-decoration: none;
      }
      footer.site-footer a:hover {
        text-decoration: underline;
      }
      footer.site-footer a:visited {
        color: var(--ok-visited);
      }

      /* Three-column footer: left / CENTER (AUP) / right */
      .footer-row {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 12px;
        align-items: center;
      }
      .footer-left {
        justify-self: start;
      }
      .footer-center {
        justify-self: center;
        white-space: nowrap;
      }
      .footer-right {
        justify-self: end;
        white-space: nowrap;
      }

      @media (max-width: 980px) {
        :root {
          --tableH: 46vh;
        }
        table {
          min-width: 900px;
        }
        .footer-row {
          grid-template-columns: 1fr;
          gap: 10px;
        }
        .footer-center,
        .footer-right {
          justify-self: start;
        }
      }

      /* Floating tooltip */
      #tooltip {
        position: fixed;
        z-index: 9999;
        pointer-events: none;
        background: var(--panel);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 12px;
        line-height: 1.35;
        max-width: 360px;
        white-space: pre-wrap;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      #tooltip.hidden {
        display: none;
      }
      th.tg {
        cursor: help;
      }
      .csHover {
        cursor: help;
      }

      .desktopOnly {
        display: initial;
      }

      /* Mobile callsign dot */
      .mDot {
        display: none;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        margin-right: 8px;
        line-height: 1;
        color: #fff;
        border: 1px solid rgba(0, 0, 0, 0.18);
      }
      [data-theme="dark"] .mDot {
        border-color: rgba(255, 255, 255, 0.18);
      }
      .mDot.online {
        background: var(--ok);
      }
      .mDot.offline {
        background: var(--bad);
      }
      .mDot.virtual {
        background: var(--virtual);
      }
      .mDot.talking {
        width: 22px;
        height: 22px;
        font-size: 11px;
      }

      /* Mobile */
      @media (max-width: 720px) {
        .desktopOnly {
          display: none !important;
        }

        header {
          padding: 10px 12px;
        }
        header h1 {
          font-size: 16px;
        }
        header .toolbar {
          gap: 10px;
        }

        #showControls {
          flex-basis: 100%;
          display: flex;
          gap: 8px;
          flex-wrap: wrap;
          align-items: center;
        }
        #showControls .muted {
          display: none;
        }
        label.check {
          padding: 3px 8px;
          font-size: 13px;
        }

        /* Hide Leaflet zoom + attribution ONLY on mobile */
        .leaflet-control-zoom {
          display: none !important;
        }
        .leaflet-control-attribution {
          display: none !important;
        }

        /* Hide footer ONLY on mobile */
        footer.site-footer {
          display: none !important;
        }

        /* Table: hide first column + TG matrix columns */
        table thead th:nth-child(1),
        table tbody td:nth-child(1) {
          display: none;
        }
        th[data-tg],
        td.tg {
          display: none;
        }
        .mDot {
          display: inline-flex;
        }

        .tableFrame {
          overflow-x: hidden;
          overflow-y: auto;
        }
        table {
          table-layout: fixed;
          min-width: 0 !important;
        }

        table thead th:nth-child(2),
        table tbody td:nth-child(2) {
          width: 38%;
          white-space: nowrap;
        }
        table thead th:nth-child(3),
        table tbody td:nth-child(3) {
          width: 47%;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        table thead th:nth-child(4),
        table tbody td:nth-child(4) {
          width: 15%;
          white-space: nowrap;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="row desktopOnly">
        <h1 id="title">SVX Reflector &#8226; Live</h1>
        <span id="status" class="conn">Connecting&hellip;</span>
      </div>

      <div class="toolbar">
        <div id="showControls">
          <span class="muted">Show:</span>
          <label class="check"
            ><input id="showRepeaters" type="checkbox" checked />
            Repeaters</label
          >
          <label class="check"
            ><input id="showHotspots" type="checkbox" checked /> Hotspots</label
          >
          <label class="check"
            ><input id="activeOnly" type="checkbox" checked /> Active
            only</label
          >
        </div>

        <label class="row">
          Window:
          <select id="windowSelect">
            <option value="3600">1h</option>
            <option value="21600">6h</option>
            <option value="43200">12h</option>
            <option value="86400">1d</option>
          </select>
        </label>

        <span class="spacer"></span>

        <label class="row" style="gap: 8px">
          <span class="legend">Dark</span>
          <label class="switch" title="Toggle light/dark">
            <input id="themeToggle" type="checkbox" />
            <span class="slider"></span>
          </label>
        </label>
      </div>
    </header>

    <main>
      <div class="tableFrame">
        <table aria-label="Nodes table">
          <thead>
            <tr id="theadRow">
              <th class="narrow center"></th>
              <th>Callsign</th>
              <th>Location</th>
              <th class="center">&#x1F552;</th>
              <!-- TG headers injected by JS -->
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div
        id="map"
        role="img"
        aria-label="Map of Belgium with repeaters and talkers"
      ></div>
    </main>

    <footer class="site-footer">
      <div class="footer-row">
        <div class="footer-left">
          Concept by
          <a
            href="https://www.qrz.com/db/ON8ST"
            target="_blank"
            rel="noopener noreferrer"
            >ON8ST</a
          >, coded by
          <a
            href="https://www.qrz.com/db/ON6URE"
            target="_blank"
            rel="noopener noreferrer"
            >ON6URE</a
          >, on top of svxreflector by
          <a
            href="https://www.qrz.com/db/SM0SVX"
            target="_blank"
            rel="noopener noreferrer"
            >SM0SVX</a
          >.
        </div>

        <div class="footer-center">
          <a href="/aup.pdf" target="_blank" rel="noopener noreferrer"
            >Acceptable Use Policy</a
          >
          |
          <a
            href="https://github.com/Guru-RF/SvxPortalApp/releases/"
            target="_blank"
            rel="noopener noreferrer"
            >Download Native Apps</a
          >
        </div>

        <div class="footer-right">
          Hosted by
          <a href="https://rf.guru" target="_blank" rel="noopener noreferrer"
            >rf.guru</a
          >
        </div>
      </div>
    </footer>

    <div id="tooltip" class="hidden" aria-hidden="true"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      crossorigin="anonymous"
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
